{% extends "base.html" %}

{% block title %}Iniciar Sesión - Gestor FIUBA{% endblock %}

{% block content %}
<div class="login-wrapper">
    <div class="login-card">
        <h2>Iniciar Sesión</h2>
        <p>Ingresá tus credenciales para acceder al sistema</p>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" required placeholder="tu@email.com">
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" required placeholder="********">
            </div>

            <div id="mensaje-error" style="color: #dc3545; font-size: 0.9rem; margin-top: 1rem; display: none; text-align: center; font-weight: 600;"></div>

            <button type="submit" class="btn-primario">Ingresar</button>
        </form>

        <div style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
            <p>¿No tenés cuenta? <a href="/registro" style="color: #004b87; font-weight: bold;">Registrate acá</a></p>
        </div>
    </div>
</div>
{% endblock %}
