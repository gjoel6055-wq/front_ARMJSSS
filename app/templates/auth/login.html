{% extends "base.html" %}

{% block title %}Iniciar Sesión - Gestor FIUBA{% endblock %}

{% block content %}
<div class="login-wrapper">
    <div class="login-card">
        <h2>Iniciar Sesión</h2>
        <p>Ingresá tus credenciales para acceder al sistema</p>

        {% if error %}
            <div class="alerta-error">
                {{ error }}
            </div>
        {% endif %}

        <form action="{{ url_for('auth.login') }}" method="POST">

            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" required placeholder="tu@email.com">
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required placeholder="********">
            </div>

            <button type="submit" class="btn-primario">Ingresar</button>
        </form>

        <div class="auth-footer">
            <p>¿No tenés cuenta? <a href="{{ url_for('auth.registro') }}" class="auth-link">Registrate acá</a></p>
        </div>
    </div>
</div>
{% endblock %}
