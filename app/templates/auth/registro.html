{% extends "base.html" %}

{% block title %}Registro - Gestor FIUBA{% endblock %}

{% block content %}
<div class="login-wrapper">
    <div class="login-card">
        <h2>Crear Cuenta</h2>
        <p>Completá tus datos para registrarte en el sistema</p>

        <form id="registroForm">
            <div class="form-group">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" required placeholder="Ej: Juan">
            </div>

            <div class="form-group">
                <label for="apellido">Apellido</label>
                <input type="text" id="apellido" required placeholder="Ej: Pérez">
            </div>

            <div class="form-group">
                <label for="apellido">Padron</label>
                <input type="text" id="padron" required placeholder="123456">
            </div>

            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" required placeholder="tu@email.com">
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" required minlength="6" placeholder="Mínimo 6 caracteres">
            </div>

            <div class="form-group">
                <label for="password-confirm">Confirma tu Contraseña</label>
                <input type="password" id="password-confirm" required minlength="6" >
            </div>


            <div id="mensaje-registro" style="font-size: 0.9rem; margin-top: 1rem; display: none; text-align: center; font-weight: 600;"></div>

            <button type="submit" class="btn-primario">Registrarme</button>
        </form>

        <div style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
            <p>¿Ya tenés una cuenta? <a href="{{ url_for('auth.login') }}" style="color: #004b87; font-weight: bold;">Iniciá sesión acá</a></p>
        </div>
    </div>
</div>
{% endblock %}
