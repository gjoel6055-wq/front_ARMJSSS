{% extends "base.html" %}

{% block title %}Registro - Gestor FIUBA{% endblock %}

{% block content %}
<div class="login-wrapper">
    <div class="login-card">
        <h2>Crear Cuenta</h2>
        <p>Completá tus datos para registrarte en el sistema</p>

        {% if error %}
            <div class="alerta-error" style="color: #721c24; background-color: #f8d7da; padding: 10px; border-radius: 5px; margin-bottom: 15px; text-align: center;">
                {{ error }}
            </div>
        {% endif %}

        <form action="{{ url_for('auth.registro') }}" method="POST" id="registroForm">

            <div class="form-group">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" name="nombre" required placeholder="Ej: Juan">
            </div>

            <div class="form-group">
                <label for="apellido">Apellido</label>
                <input type="text" id="apellido" name="apellido" required placeholder="Ej: Pérez">
            </div>

            <div class="form-group">
                <label for="padron">Padron</label>
                <input type="text" id="padron" name="padron" required placeholder="123456">
            </div>

            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" required placeholder="tu@email.com">
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required minlength="6" placeholder="Mínimo 6 caracteres">
            </div>

            <div class="form-group">
                <label for="password-confirm">Confirma tu Contraseña</label>
                <input type="password" id="password-confirm" name="password_confirm" required minlength="6" >
            </div>

            <button type="submit" class="btn-primario" style="margin-top: 1.5rem;">Registrar</button>
        </form>
    </div>
</div>
{% endblock %}
