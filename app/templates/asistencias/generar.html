{% extends "base.html" %}

{% block content %}
<div class="modulo-header">
    <h2>Control de Asistencia</h2>
    <p>Iniciá la clase para enviar los QRs a todos los alumnos.</p>
</div>

<div class="login-wrapper wrapper-mitad">
    <div class="login-card">
        <form action="{{ url_for('asistencia.generar') }}" method="POST">
            <button type="submit" class="btn-primario btn-bloque"
                    onclick="this.innerText='Enviando mails...'; this.disabled=true; this.form.submit();">
                Iniciar Clase y Enviar QRs
            </button>
        </form>
    </div>
</div>
{% endblock %}
